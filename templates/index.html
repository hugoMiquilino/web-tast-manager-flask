<!DOCTYPE html>
<html>

<head>
    <title>Lista de Tarefas</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        body {
            background: #fff29e;
            background: linear-gradient(0deg, rgb(255, 250, 218) 0%, rgba(253, 215, 45, 1) 100%);
        }

        #main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #main-container h1 {
            font-size: 4em;
            color: #1a0a53;
            margin-bottom: 20px;
        }

        #container {
            background: #ffee58;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #1a0a53;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            margin-bottom: 10px;
            font-size: 18px;
        }

        a {
            margin-left: 10px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <h1>Web Task Manager</h1>

        <div id="container">

            <form method="POST" action="/add">
                <input name="tarefa" placeholder="Digite uma tarefa">
                <button type="submit">Adicionar</button>
            </form>

            <ul>
                {% for tarefa in tarefas %}
                {% if tarefas|length == 0 %}
                <p>Nenhuma tarefa ainda.</p>
                {% endif %}
                <li>

                    {% if tarefa.feito %}
                    <s>{{ tarefa.texto }}</s>
                    {% else %}
                    {{ tarefa.texto }}
                    {% endif %}

                    <a href="/done/{{ loop.index0 }}" title="Concluir">✅</a>
                    <a href="/delete/{{ loop.index0 }}" title="Remover">❌</a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>

</html>
